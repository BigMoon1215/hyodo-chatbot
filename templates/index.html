<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>효도 말벗이 - 어르신 쉬운 화면</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
            background-color: #f3f7fa;
            -webkit-tap-highlight-color: transparent;
            transition: all 0.15s ease-in-out;
        }
        .big-menu-card {
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }
        .big-menu-card:active {
            transform: scale(0.95);
        }
        .keep-all {
            word-break: keep-all;
            overflow-wrap: break-word;
        }
        .size-normal {
            font-size: 1.3rem;
            line-height: 1.7;
        }
        .size-normal h1 { font-size: 1.95rem; }
        .size-normal h2 { font-size: 1.55rem; }
        .size-normal p { font-size: 1.2rem; }
        .size-normal button, .size-normal input, .size-normal select { font-size: 1.25rem; }
        .size-large {
            font-size: 1.55rem;
            line-height: 1.9;
        }
        .size-large h1 { font-size: 2.35rem; }
        .size-large h2 { font-size: 1.85rem; }
        .size-large p { font-size: 1.4rem; }
        .size-large button, .size-large input, .size-large select { font-size: 1.5rem; }
        .size-large input, .size-large select { padding-top: 1.2rem !important; padding-bottom: 1.2rem !important; }
        .size-large button { padding-top: 1.1rem !important; padding-bottom: 1.1rem !important; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes pulse-red {
            0%, 100% { background-color: rgba(239, 68, 68, 0.9); }
            50% { background-color: rgba(220, 38, 38, 0.7); }
        }
        .alarm-active-bg { animation: pulse-red 1.5s infinite; }
    </style>
</head>
<body class="size-normal text-gray-900 flex flex-col min-h-screen pb-6 keep-all" id="app-body">

    <header class="bg-blue-600 text-white p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-md mx-auto relative flex items-center justify-center min-h-[56px]">
            <div class="flex items-center space-x-2 whitespace-nowrap">
                <span class="text-3xl flex-shrink-0">👵</span>
                <h1 class="font-black tracking-tight whitespace-nowrap">효도 말벗이</h1>
                <span class="text-xs text-blue-100 font-bold ml-1 whitespace-nowrap hidden xs:inline">도우미</span>
            </div>
            <div class="absolute right-0 top-1/2 -translate-y-1/2">
                <button onclick="toggleGlobalTextSize()" class="bg-yellow-400 hover:bg-yellow-500 text-blue-900 font-black px-3 py-2 rounded-xl shadow-md active:scale-95 transition-transform flex items-center space-x-1">
                    <i class="fa-solid fa-magnifying-glass-plus text-sm"></i>
                    <span class="text-xs whitespace-nowrap"><span id="size-indicator">더 크게</span></span>
                </button>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-md w-full mx-auto p-4 flex flex-col justify-start">

        <!-- 메인 페이지 -->
        <div id="page-main" class="block space-y-6 my-auto w-full">
            <div class="text-center py-2">
                <p class="font-black text-blue-800 text-xl leading-snug">원하시는 기능의 큰 버튼을<br>손가락으로 콕 눌러주세요!</p>
            </div>
            <div class="grid grid-cols-2 gap-4 auto-rows-fr">
                <button onclick="goToPage('chat')" class="big-menu-card bg-blue-500 hover:bg-blue-600 text-white p-5 rounded-[2.5rem] shadow-lg flex flex-col items-center justify-center text-center border-4 border-blue-300 h-full">
                    <span class="text-4xl bg-white bg-opacity-20 p-2.5 rounded-2xl mb-2">💬</span>
                    <h2 class="font-black whitespace-nowrap">말상대 챗봇</h2>
                    <p class="text-blue-100 text-[0.85rem] font-medium mt-1 leading-tight whitespace-nowrap">대화 나누기</p>
                </button>
                <button onclick="goToPage('medication')" class="big-menu-card bg-green-500 hover:bg-green-600 text-white p-5 rounded-[2.5rem] shadow-lg flex flex-col items-center justify-center text-center border-4 border-green-300 h-full">
                    <span class="text-4xl bg-white bg-opacity-20 p-2.5 rounded-2xl mb-2">💊</span>
                    <h2 class="font-black whitespace-nowrap">소중한 약 알림</h2>
                    <p class="text-green-100 text-[0.85rem] font-medium mt-1 leading-tight whitespace-nowrap">복용시간 체크</p>
                </button>
                <button onclick="goToPage('routine')" class="big-menu-card bg-yellow-500 hover:bg-yellow-600 text-white p-5 rounded-[2.5rem] shadow-lg flex flex-col items-center justify-center text-center border-4 border-yellow-300 h-full">
                    <span class="text-4xl bg-white bg-opacity-20 p-2.5 rounded-2xl mb-2">⏰</span>
                    <h2 class="font-black whitespace-nowrap">오늘 건강습관</h2>
                    <p class="text-yellow-100 text-[0.85rem] font-medium mt-1 leading-tight whitespace-nowrap">건강습관 체크</p>
                </button>
                <button onclick="goToPage('search')" class="big-menu-card bg-purple-500 hover:bg-purple-600 text-white p-5 rounded-[2.5rem] shadow-lg flex flex-col items-center justify-center text-center border-4 border-purple-300 h-full">
                    <span class="text-4xl bg-white bg-opacity-20 p-2.5 rounded-2xl mb-2">🔍</span>
                    <h2 class="font-black whitespace-nowrap">쉬운 한글검색</h2>
                    <p class="text-purple-100 text-[0.85rem] font-medium mt-1 leading-tight whitespace-nowrap">정보 찾아보기</p>
                </button>
            </div>
        </div>

        <!-- 채팅 페이지 -->
        <div id="page-chat" class="hidden space-y-4 w-full">
            <button onclick="goToPage('main')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 px-6 rounded-3xl font-black flex items-center justify-center space-x-2.5 shadow-md active:scale-95 transition-transform text-xl">
                <i class="fa-solid fa-house-chimney text-2xl"></i>
                <span>◀ 처음 화면으로 돌아가기</span>
            </button>
            <div id="chat-window" class="bg-white rounded-3xl p-4 shadow-inner h-[320px] overflow-y-auto space-y-4 border-2 border-blue-200">
                <div class="flex items-start space-x-2">
                    <div class="w-12 h-12 rounded-full bg-blue-500 flex items-center justify-center text-2xl shadow text-white flex-shrink-0">🤖</div>
                    <div class="bg-blue-50 text-gray-800 p-4 rounded-3xl rounded-tl-none max-w-[80%] shadow-sm font-black">
                        어르신 반가워요! 저에게 편하게 말씀해 주세요. 😊
                    </div>
                </div>
            </div>
            <div class="bg-white p-3 rounded-2xl shadow-md border-2 border-gray-200">
                <div class="flex items-center space-x-2">
                    <button onclick="simulateChatSTT()" class="w-16 h-16 bg-red-500 hover:bg-red-600 text-white rounded-full flex items-center justify-center shadow-lg active:scale-90 flex-shrink-0">
                        <i class="fa-solid fa-microphone text-3xl"></i>
                    </button>
                    <input type="text" id="user-input" placeholder="글을 적어보세요" class="flex-grow p-4 border-2 border-gray-300 rounded-2xl focus:outline-none focus:border-blue-500 font-bold placeholder-gray-400 min-w-0">
                    <button onclick="processLocalChat()" class="w-16 h-16 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl flex items-center justify-center shadow-lg active:scale-90 flex-shrink-0">
                        <i class="fa-solid fa-paper-plane text-2xl"></i>
                    </button>
                </div>
                <div id="voice-indicator" class="hidden mt-2 bg-red-100 text-red-800 text-center p-3 rounded-xl font-black animate-pulse">🎤 목소리를 듣고 있어요...</div>
            </div>
        </div>

        <!-- 약 알림 페이지 -->
        <div id="page-medication" class="hidden space-y-4 w-full">
            <button onclick="goToPage('main')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 px-6 rounded-3xl font-black flex items-center justify-center space-x-2.5 shadow-md active:scale-95 transition-transform text-xl">
                <i class="fa-solid fa-house-chimney text-2xl"></i>
                <span>◀ 처음 화면으로 돌아가기</span>
            </button>
            <div class="bg-white rounded-3xl p-5 shadow-md border-2 border-green-300 space-y-4">
                <h2 class="font-black text-green-800">💊 건강약 등록하기</h2>
                <div class="space-y-4">
                    <div>
                        <label class="block font-black text-gray-700 mb-1">어떤 약을 드시나요?</label>
                        <div class="flex items-center space-x-2">
                            <button onclick="simulateMedicationSTT('name')" class="w-14 h-14 bg-red-500 text-white rounded-full flex-shrink-0 shadow-md active:scale-90"><i class="fa-solid fa-microphone text-2xl"></i></button>
                            <input type="text" id="med-name" placeholder="예: 혈압약" class="flex-grow p-4 border-2 border-gray-300 rounded-2xl font-bold min-w-0">
                        </div>
                    </div>
                    <div>
                        <label class="block font-black text-gray-700 mb-1">언제 드시나요? (시간)</label>
                        <div class="flex items-center space-x-2">
                            <button onclick="simulateMedicationSTT('time')" class="w-14 h-14 bg-red-500 text-white rounded-full flex-shrink-0 shadow-md active:scale-90"><i class="fa-solid fa-microphone text-2xl"></i></button>
                            <input type="time" id="custom-time-input" class="flex-grow p-4 border-2 border-gray-300 rounded-2xl font-black text-xl min-w-0">
                        </div>
                    </div>
                    <div id="med-voice-indicator" class="hidden bg-red-50 text-red-700 text-center p-3 rounded-xl font-bold animate-pulse">🎤 약 정보나 시간을 말씀해 주세요...</div>
                    <button onclick="addMedication()" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-2xl font-black shadow-md">내 약 저장하기</button>
                </div>
                <div class="pt-4 border-t">
                    <h3 class="font-black text-gray-800 mb-3">🔔 등록된 약 목록</h3>
                    <ul id="med-list" class="space-y-2"></ul>
                </div>
            </div>
        </div>

        <!-- 건강습관 페이지 -->
        <div id="page-routine" class="hidden space-y-4 w-full">
            <button onclick="goToPage('main')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 px-6 rounded-3xl font-black flex items-center justify-center space-x-2.5 shadow-md active:scale-95 transition-transform text-xl">
                <i class="fa-solid fa-house-chimney text-2xl"></i>
                <span>◀ 처음 화면으로 돌아가기</span>
            </button>
            <div class="bg-white rounded-3xl p-5 shadow-md border-2 border-yellow-300 space-y-4">
                <h2 class="font-black text-yellow-800">⏰ 오늘 건강 약속</h2>
                <div class="space-y-3" id="routine-list">
                    <label class="flex items-start p-4 bg-yellow-50 rounded-2xl border-2 border-yellow-200 cursor-pointer hover:bg-yellow-100 gap-3">
                        <input type="checkbox" class="w-9 h-9 text-yellow-600 rounded-xl flex-shrink-0 mt-0.5">
                        <span class="font-black text-gray-800">💧 깨끗한 물 한 잔 마시기</span>
                    </label>
                </div>
                <div class="pt-3 border-t space-y-2">
                    <div class="flex items-center space-x-2">
                        <button onclick="simulateRoutineSTT()" class="w-14 h-14 bg-red-500 text-white rounded-full flex-shrink-0 active:scale-90"><i class="fa-solid fa-microphone text-2xl"></i></button>
                        <input type="text" id="new-routine-text" placeholder="약속을 적어보세요" class="flex-grow p-4 border-2 border-gray-300 rounded-2xl font-bold min-w-0">
                        <button onclick="addRoutine()" class="w-14 h-14 bg-yellow-500 text-white rounded-2xl flex-shrink-0 active:scale-90"><i class="fa-solid fa-plus text-2xl"></i></button>
                    </div>
                    <div id="routine-voice-indicator" class="hidden bg-red-50 text-red-700 text-center p-3 rounded-xl font-bold animate-pulse">🎤 건강 약속을 말씀해 보세요...</div>
                </div>
            </div>
        </div>

        <!-- 검색 페이지 -->
        <div id="page-search" class="hidden space-y-4 w-full">
            <button onclick="goToPage('main')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 px-6 rounded-3xl font-black flex items-center justify-center space-x-2.5 shadow-md active:scale-95 transition-transform text-xl">
                <i class="fa-solid fa-house-chimney text-2xl"></i>
                <span>◀ 처음 화면으로 돌아가기</span>
            </button>
            <div class="bg-white rounded-3xl p-5 shadow-md border-2 border-purple-300 space-y-4">
                <h2 class="font-black text-purple-800">🔍 돋보기 검색방</h2>
                <div class="flex items-center space-x-2">
                    <button onclick="simulateSearchSTT()" class="w-14 h-14 bg-red-500 text-white rounded-full flex-shrink-0 active:scale-90"><i class="fa-solid fa-microphone text-2xl"></i></button>
                    <input type="text" id="easy-search-query" placeholder="궁금한 내용을 적으세요" class="flex-grow p-4 border-2 border-gray-300 rounded-2xl font-bold min-w-0">
                    <button onclick="executeEasySearch()" class="w-14 h-14 bg-purple-600 text-white rounded-2xl flex-shrink-0 active:scale-90"><i class="fa-solid fa-search text-2xl"></i></button>
                </div>
                <div id="search-voice-indicator" class="hidden bg-red-50 text-red-700 text-center p-3 rounded-xl font-bold animate-pulse">🎤 궁금한 내용을 말씀해 주세요...</div>
                <div id="search-results" class="mt-4 p-4 bg-purple-50 rounded-2xl border-2 border-purple-200 hidden">
                    <p id="search-result-text" class="text-gray-800 font-black"></p>
                </div>
            </div>
        </div>

    </main>

    <!-- 약 알림 팝업 -->
    <div id="alarm-popup-overlay" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-red-600/90 hidden alarm-active-bg">
        <div class="bg-white rounded-[3rem] p-8 max-w-md w-full shadow-2xl border-8 border-yellow-400 text-center space-y-6">
            <span class="text-7xl block animate-bounce">🚨</span>
            <h2 class="text-3xl font-black text-red-600">약 먹을 시간입니다!</h2>
            <p id="alarm-medicine-name" class="text-2xl font-black text-gray-800 bg-gray-100 p-4 rounded-2xl border-2 border-gray-200">혈압약</p>
            <div class="grid grid-cols-1 gap-3">
                <button onclick="dismissAlarm()" class="w-full bg-green-600 text-white py-5 px-6 rounded-2xl text-2xl font-black shadow-lg">약 먹었습니다 (끄기)</button>
                <button onclick="snoozeAlarm()" class="w-full bg-yellow-400 text-blue-900 py-4 px-6 rounded-2xl text-lg font-black">1분 뒤에 다시 알려줘</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
